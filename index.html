<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alice's Cleaning - Water Fill Preloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --olive-dark: #5a6f4a;
            --olive-medium: #7a9063;
            --olive-light: #a8ba94;
            --cream: #f5f3ef;
            --brown-accent: #8b7355;
            --water-dark: #4a6e3a;
            --water-light: #8fc070;
            --white: #fefefe;
        }

        body {
            font-family: 'Lato', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, #e8e4dc 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f0ede7 0%, #e2ddd2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s ease;
        }

        .preloader.hide {
            opacity: 0;
            visibility: hidden;
        }

        .water-text-container {
            text-align: center;
            padding: 2rem;
            max-width: 95vw;
            margin: 0 auto;
        }

        .water-fill-text {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: clamp(3rem, 12vw, 6.5rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            background: linear-gradient(
                to bottom,
                var(--water-dark) 0%,
                var(--water-light) 35%,
                #c2e0a8 65%,
                #daf0c0 100%
            );
            background-size: 100% 200%;
            background-repeat: no-repeat;
            background-position: 0% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            transition: opacity 0.6s ease-out;
        }

        .water-fill-text.fade-out {
            opacity: 0;
        }

        .wave-overlay {
            position: relative;
            display: inline-block;
        }

        .wave-overlay::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: clamp(3rem, 12vw, 6.5rem);
            font-weight: 700;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 3px,
                rgba(80, 110, 60, 0.2) 3px,
                rgba(80, 110, 60, 0.2) 8px
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            pointer-events: none;
            z-index: 2;
            animation: waveShift 1.2s infinite ease-in-out;
        }

        @keyframes waveShift {
            0% { transform: translateY(0px); }
            50% { transform: translateY(3px); }
            100% { transform: translateY(0px); }
        }

        .water-bubbles {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            opacity: 0.6;
        }

        .bubble {
            width: 8px;
            height: 8px;
            background: var(--water-light);
            border-radius: 50%;
            animation: bubbleFloat 2s infinite ease-in-out;
        }

        .bubble:nth-child(2) { width: 12px; height: 12px; animation-delay: 0.3s; background: #8bb36b; }
        .bubble:nth-child(3) { width: 6px; height: 6px; animation-delay: 0.7s; }
        .bubble:nth-child(4) { width: 10px; height: 10px; animation-delay: 0.2s; }
        .bubble:nth-child(5) { width: 14px; height: 14px; animation-delay: 0.5s; background: #6e9558; }

        @keyframes bubbleFloat {
            0% { transform: translateY(0px) scale(1); opacity: 0.4; }
            50% { transform: translateY(-15px) scale(1.1); opacity: 0.9; }
            100% { transform: translateY(0px) scale(1); opacity: 0.4; }
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            text-align: center;
            opacity: 0;
            transform: scale(0.96);
            transition: opacity 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.7s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-content.visible {
            opacity: 1;
            transform: scale(1);
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px rgba(90, 111, 74, 0.2);
            border: 1px solid rgba(122, 144, 99, 0.3);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: var(--olive-dark);
            margin-bottom: 1rem;
        }

        .brand-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: #3d4936;
            font-size: 1.2rem;
            line-height: 1.6;
            max-width: 600px;
            margin: 1rem auto;
        }

        .eco-badge {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(122, 144, 99, 0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            color: var(--olive-dark);
            font-weight: 600;
        }

        button {
            background: linear-gradient(135deg, var(--olive-medium), var(--olive-dark));
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(90, 111, 74, 0.3);
        }

        .footer-note {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @media (max-width: 640px) {
            .welcome-card {
                padding: 2rem 1.2rem;
            }
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
            .badge {
                font-size: 0.75rem;
            }
            .water-fill-text {
                letter-spacing: normal;
            }
        }
    </style>
</head>
<body>

<div class="preloader" id="preloader">
    <div class="water-text-container">
        <div class="wave-overlay" data-text="Alice's Cleaning">
            <div class="water-fill-text" id="waterText">Alice's Cleaning</div>
        </div>
        <div class="water-bubbles">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="welcome-card">
        <div class="brand-icon">🏡💧🌿</div>
        <h1>Welcome to Alice's Eco House Cleaning</h1>
        <p>Your home, naturally radiant. 100% plant-based cleaning with love. We bring nature's best to your doorstep.</p>
        <div class="eco-badge">
            <span class="badge">🌱 100% Natural</span>
            <span class="badge">🧼 Professional Care</span>
            <span class="badge">✨ Trusted Since 2016</span>
        </div>
        <button id="replayBtn">💧 Replay Water Fill Animation</button>
        <div class="footer-note">Hamptons & surrounding areas | Eco-friendly promise</div>
    </div>
</div>

<script>
(function() {
    const preloader = document.getElementById('preloader');
    const mainContent = document.getElementById('mainContent');
    const waterTextEl = document.getElementById('waterText');
    
    let animationFrameId = null;
    let isComplete = false;
    
    function setWaterFill(percent) {
        const positionY = 100 - percent;
        waterTextEl.style.backgroundPosition = `0% ${positionY}%`;
        
        if (percent >= 100 && !isComplete) {
            isComplete = true;
            waterTextEl.classList.add('fade-out');
            setTimeout(() => {
                preloader.classList.add('hide');
                mainContent.classList.add('visible');
            }, 600);
        }
    }
    
    function startWaterFill() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        
        isComplete = false;
        waterTextEl.classList.remove('fade-out');
        waterTextEl.style.backgroundPosition = `0% 100%`;
        preloader.classList.remove('hide');
        preloader.style.opacity = '1';
        preloader.style.visibility = 'visible';
        mainContent.classList.remove('visible');
        
        const duration = 2200;
        const startTime = performance.now();
        
        function step(now) {
            const elapsed = now - startTime;
            let percent = Math.min(100, (elapsed / duration) * 100);
            setWaterFill(percent);
            
            if (percent < 100) {
                animationFrameId = requestAnimationFrame(step);
            } else {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }
        
        animationFrameId = requestAnimationFrame(step);
    }
    
    function replayAnimation() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        isComplete = false;
        mainContent.classList.remove('visible');
        preloader.classList.remove('hide');
        preloader.style.opacity = '1';
        preloader.style.visibility = 'visible';
        waterTextEl.classList.remove('fade-out');
        waterTextEl.style.backgroundPosition = `0% 100%`;
        
        setTimeout(() => {
            startWaterFill();
        }, 50);
    }
    
    const replayBtn = document.getElementById('replayBtn');
    if (replayBtn) {
        replayBtn.addEventListener('click', (e) => {
            e.preventDefault();
            replayAnimation();
        });
    }
    
    window.addEventListener('load', () => {
        setTimeout(() => {
            startWaterFill();
        }, 200);
    });
    
    let waveX = 0;
    function waveEffectLoop() {
        if (!preloader.classList.contains('hide')) {
            waveX = (waveX + 0.3) % 6;
            if (waterTextEl) waterTextEl.style.backgroundPositionX = `${waveX}px`;
        }
        requestAnimationFrame(waveEffectLoop);
    }
    waveEffectLoop();
})();
</script>

<style>
    .water-fill-text {
        background: linear-gradient(
            to bottom,
            #4a6e3a,
            #7aad5a,
            #a8d480,
            #c5ea9e
        );
        background-size: 100% 200%;
        background-repeat: no-repeat;
        background-position: 0% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        transition: background-position 0.03s linear, opacity 0.6s ease-out;
    }
    
    .wave-overlay::before {
        mix-blend-mode: overlay;
        opacity: 0.4;
    }
    
    @media (max-width: 550px) {
        .water-fill-text {
            font-size: clamp(2.3rem, 10vw, 3.8rem);
        }
        .wave-overlay::before {
            font-size: clamp(2.3rem, 10vw, 3.8rem);
        }
    }
    
    .preloader {
        background: radial-gradient(ellipse at center, #f7f4ed 0%, #e6e0d4 100%);
    }
</style>
</body>
</html>
