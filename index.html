<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Elegant Cleanse | Professional Loading Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Prevents accidental selection on animation */
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', 'Helvetica Neue', sans-serif;
            background: #f3efe5;  /* soft creamy base */
        }

        /* MAIN LOADING SCREEN CONTAINER */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #eef0e0 0%, #dbe3ce 100%);
            /* soft light green to olive undertone cream */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(0px);
        }

        /* subtle texture overlay for refinement */
        .loading-screen::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#cbd8b0 0.8px, transparent 0.8px);
            background-size: 28px 28px;
            opacity: 0.2;
            pointer-events: none;
        }

        /* CARD-LIKE ANIMATION ZONE */
        .animation-stage {
            background: rgba(250, 248, 240, 0.65);
            backdrop-filter: blur(2px);
            border-radius: 64px;
            padding: 2rem 3rem;
            box-shadow: 0 20px 35px -12px rgba(60, 45, 30, 0.12), 0 1px 3px rgba(0,0,0,0.02);
            border: 1px solid rgba(215, 205, 175, 0.5);
            margin-bottom: 2.5rem;
        }

        /* CANVAS where tools morph */
        .morph-canvas {
            width: 280px;
            height: 280px;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 8px 12px rgba(70, 60, 40, 0.1));
        }

        /* subtle caption / loading text */
        .loading-caption {
            margin-top: 2rem;
            font-weight: 450;
            letter-spacing: 0.3px;
            font-size: 1rem;
            color: #5c6048;
            background: rgba(245, 242, 232, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            border: 0.5px solid #dad1ba;
            font-family: inherit;
        }

        .loading-caption span {
            font-weight: 500;
            color: #5f6b3c;
        }

        /* progress bar - minimalist, elegant */
        .progress-container {
            width: 240px;
            margin-top: 1.8rem;
            background: #e2decb;
            border-radius: 100px;
            height: 4px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #83945e;
            border-radius: 100px;
            transition: width 0.25s linear;
        }

        /* loading percentage */
        .percent-text {
            margin-top: 0.6rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #7c8262;
            letter-spacing: 0.5px;
        }

        /* professional subtle brand line */
        .brand-note {
            position: absolute;
            bottom: 28px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #b0aa8b;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* content that appears after loading (hidden initially) */
        .main-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease 0.1s;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f7f0;
        }

        .demo-card {
            background: white;
            max-width: 500px;
            padding: 2.8rem;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
            border: 1px solid #e9e2cf;
        }

        .demo-card h2 {
            font-weight: 500;
            color: #6e7b4a;
            margin-bottom: 0.75rem;
        }

        .demo-card p {
            color: #8e927a;
            line-height: 1.5;
        }

        /* responsive */
        @media (max-width: 550px) {
            .animation-stage {
                padding: 1rem 2rem;
            }
            .morph-canvas {
                width: 220px;
                height: 220px;
            }
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="animation-stage">
        <canvas id="toolCanvas" class="morph-canvas" width="300" height="300" style="width:100%; max-width:300px; height:auto; aspect-ratio:1/1"></canvas>
    </div>
    <div class="loading-caption">
        ✨ <span>preparing essentials</span> ✨
    </div>
    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="percent-text" id="percentLabel">0%</div>
    <div class="brand-note">clean flow · professional morphing sequence</div>
</div>

<div class="main-content" id="mainContent">
    <div class="demo-card">
        <h2>✨ spotless journey ✨</h2>
        <p>Your cleaning tools are ready.<br>Broom · Mop · Vacuum · Duster · Squeegee — seamless transition.<br><br> <span style="font-size:0.85rem; color:#b7b78a;">professional loading complete</span></p>
    </div>
</div>

<script>
    (function(){
        // --------------------------------------------------------------
        // PROFESSIONAL MORPHING SEQUENCE: BROOM -> MOP -> VACUUM -> DUSTER -> SQUEEGEE
        // using canvas vector-like path interpolation (custom shapes)
        // each tool is represented as a set of control points & we morph weights.
        // To achieve high quality & detailed morph, we use a hybrid approach:
        // Each tool defines key features (paths). We'll do shape tween between 2 consecutive tools.
        // But since we need 5 tools morphing in loop (for loading screen), we create a cyclic transition.
        // Loading progress runs from 0% to 100% over 5.5 seconds (adjustable) and each tool occupies a segment.
        // While loading, animation cycles: broom -> mop -> vacuum -> duster -> squeegee -> (repeat or stop at end)
        // However, loading only completes once 100% reached, then exit. For professional loading, 
        // we will play the full morph cycle exactly ONCE from start to end? No — loading can simulate asset loading.
        // We'll map progress: 0% = broom, 25% = mop, 50% = vacuum, 75% = duster, 100% = squeegee (final).
        // Between these intervals, we morph smoothly between current and next tool.
        // To make it buttery smooth, we implement custom shape interpolation.
        // For simplicity & high detail, each cleaning tool is drawn via SVG-like path commands using canvas bezier curves,
        // but for morphing we need to interpolate between two sets of anchor points. We'll design parametric shape description.
        // Approach: define each tool as an array of "segments" (moveTo, lineTo, bezierCurveTo) but with fixed number of points?
        // Better: For each tool, we generate a stylized silhouette using a set of dynamic points that can interpolate.
        // Instead of heavy point matching, we create custom morphing by blending drawing parameters using tween factor.
        // We'll create 5 distinct drawing functions, and in each frame we compute blend factor between current tool index & next.
        // Then we 'mix' graphical parameters (positions, angles, lengths) to get intermediate representation.
        // That ensures every frame morphs naturally and looks like one tool transforms to another.
        
        // define tool metadata
        const tools = ['broom', 'mop', 'vacuum', 'duster', 'squeegee'];
        const totalTools = tools.length;
        
        // animation state for loading simulation
        let startTime = null;
        let animationFrameId = null;
        let loadingComplete = false;
        
        const canvas = document.getElementById('toolCanvas');
        const ctx = canvas.getContext('2d');
        
        // set canvas actual dimensions (retina friendly)
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(280, window.innerWidth * 0.5);
            canvas.style.width = `${size}px`;
            canvas.style.height = `${size}px`;
            canvas.width = 300;
            canvas.height = 300;
            drawFrame(0); // initial draw
        }
        window.addEventListener('resize', () => { if(!loadingComplete) resizeCanvas(); });
        
        // ---- PROFESSIONAL CUSTOM DRAWING WITH MORPH BLENDING ----
        // Instead of random, we define each tool's key parameters:
        // For broom: handle + bristle fan; mop: handle + mop head (rectangular + strings)
        // Vacuum: canister + hose/nozzle; duster: handle + fluffy feathers; squeegee: handle + rubber blade.
        // We will use a unified coordinate system (0-1 normalized, center 150,150, scale 140).
        // For interpolation we define an object containing all visual control attributes.
        
        // define tool descriptors (parametric)
        function getToolParams(toolName, t = 1) {
            // t = 1 gives exact shape, but for morph we compute mix between two params.
            // We'll return shape attributes: handleAngle, handleLength, headType, extra factors.
            // Since full morph needs different geometries, we'll write a general drawing function that uses param weights.
            // to keep it robust, we manually draw based on morph factor between two consecutive tools.
            // Let's implement a direct interpolated drawer: given factor (0..1) from toolA to toolB.
            // but for 5 step sequence we need dynamic pairs. Best: on each frame compute exact progress (0-1 global)
            // then determine tool index and intra tween. We'll call drawing function with global morph factor.
        }
        
        // Better: unified drawing that accepts a 'blend' array of tool contributions? Not needed.
        // We implement a custom interpolated drawer for each adjacent pair: broom->mop, mop->vacuum, vacuum->duster, duster->squeegee.
        // Given a value 'mix' 0..1 for transition from current to next, we call specialized morph function.
        // This gives full control and detailed shape transformation.
        
        // ============== INDIVIDUAL MORPHING FUNCTIONS ===============
        // Each function receives ctx, width, height, t (0 to 1) where 0 = first tool, 1 = second tool.
        // They are tailor-made for smooth & professional transformation.
        
        // 1. Broom (t=0) -> MOP (t=1)
        function drawBroomToMop(ctx, t) {
            ctx.clearRect(0, 0, 300, 300);
            ctx.save();
            ctx.translate(150, 150);
            // handle base properties
            const handleAngle = -0.25 * Math.PI + (t * 0.05); // slight shift
            const handleLength = 95 - (t * 8);  // broom handle slightly longer, mop shorter
            const handleWidth = 8;
            // handle color: olive to soft brown
            const handleColor = `rgba(105, 95, 65, ${1 - t*0.2})`;
            ctx.beginPath();
            const startX = -15 + t * 3;
            const startY = 65 - t * 12;
            const endX = startX + Math.sin(handleAngle) * handleLength;
            const endY = startY + Math.cos(handleAngle) * handleLength;
            ctx.moveTo(startX - handleWidth/2, startY);
            ctx.lineTo(endX - handleWidth/2, endY);
            ctx.lineTo(endX + handleWidth/2, endY);
            ctx.lineTo(startX + handleWidth/2, startY);
            ctx.fillStyle = handleColor;
            ctx.fill();
            
            // Broom head part (bristle fan)
            if (t < 0.9) {
                const bristleFactor = Math.max(0, 1 - t * 1.2);
                ctx.beginPath();
                ctx.moveTo(endX - 12, endY);
                ctx.quadraticCurveTo(endX + (1-t)*6, endY + 18 * (1-t), endX + (8 - t*12), endY + 24 * bristleFactor);
                ctx.lineTo(endX - (8 - t*8), endY + 24 * bristleFactor);
                ctx.quadraticCurveTo(endX - (1-t)*6, endY + 18 * (1-t), endX + 12, endY);
                ctx.fillStyle = `rgba(125, 110, 70, ${1 - t*0.7})`;
                ctx.fill();
                // bristle lines
                for(let i=0; i<8; i++) {
                    ctx.beginPath();
                    const off = -10 + i*3;
                    ctx.moveTo(endX + off, endY);
                    ctx.lineTo(endX + off + (1-t)*7, endY + 18 * (1-t));
                    ctx.strokeStyle = `rgba(90, 70, 40, ${0.6*(1-t)})`;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }
            }
            
            // Mop head (appears as t increases)
            if (t > 0.1) {
                const mopStrength = Math.min(1, Math.max(0, (t - 0.1)/0.9));
                ctx.beginPath();
                const mopX = endX + (3 - mopStrength*2);
                const mopY = endY + 6 * mopStrength;
                ctx.ellipse(mopX, mopY + 12 * mopStrength, 12 + mopStrength*2, 16 * mopStrength, 0, 0, Math.PI*2);
                ctx.fillStyle = `rgba(160, 140, 100, ${0.85 * mopStrength})`;
                ctx.fill();
                // mop strings
                for(let s=0; s<12; s++) {
                    ctx.beginPath();
                    const angleOff = -0.6 + s*0.12;
                    ctx.moveTo(mopX + Math.sin(angleOff)*8, mopY + 4);
                    ctx.lineTo(mopX + Math.sin(angleOff)*12, mopY + 22 * mopStrength);
                    ctx.strokeStyle = `rgba(115, 90, 60, ${0.6 * mopStrength})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            }
            ctx.restore();
        }
        
        // 2. MOP (t=0) -> VACUUM (t=1)
        function drawMopToVacuum(ctx, t) {
            ctx.clearRect(0,0,300,300);
            ctx.save();
            ctx.translate(150,150);
            const handleAngle = -0.22 * Math.PI + t * 0.1;
            const handleLength = 85 - t * 12;
            const startX = -10;
            const startY = 58 - t*10;
            const endX = startX + Math.sin(handleAngle) * handleLength;
            const endY = startY + Math.cos(handleAngle) * handleLength;
            // handle
            ctx.beginPath();
            ctx.rect(startX-5, startY-3, 10, handleLength);
            ctx.fillStyle = `rgba(100, 85, 60, 0.9)`;
            ctx.fill();
            // mop head (fading)
            if(t<0.8){
                const mopAlpha = 1 - t/0.8;
                ctx.beginPath();
                ctx.ellipse(endX-2, endY+12, 14, 18*mopAlpha, 0,0, Math.PI*2);
                ctx.fillStyle = `rgba(145, 120, 85, ${0.8*mopAlpha})`;
                ctx.fill();
            }
            // Vacuum part (body appears)
            if(t>0.2){
                const vacIntensity = Math.min(1, (t-0.2)/0.8);
                const bodyX = endX + 8 * vacIntensity;
                const bodyY = endY - 10 * vacIntensity;
                ctx.beginPath();
                ctx.ellipse(bodyX+5, bodyY+12, 18*vacIntensity, 14*vacIntensity, 0,0,Math.PI*2);
                ctx.fillStyle = `rgba(70, 85, 60, ${0.9*vacIntensity})`;
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(bodyX+2, bodyY+24, 10*vacIntensity, 8*vacIntensity, 0,0,Math.PI*2);
                ctx.fillStyle = `rgba(55, 65, 45, ${0.8*vacIntensity})`;
                ctx.fill();
                // nozzle / hose
                ctx.beginPath();
                ctx.moveTo(bodyX+8, bodyY+16);
                ctx.lineTo(bodyX+28*vacIntensity, bodyY+20*vacIntensity);
                ctx.lineWidth = 5*vacIntensity;
                ctx.strokeStyle = `rgba(45,55,40,${0.8*vacIntensity})`;
                ctx.stroke();
            }
            ctx.restore();
        }
        
        // 3. VACUUM (t=0) -> DUSTER (t=1)
        function drawVacuumToDuster(ctx, t) {
            ctx.clearRect(0,0,300,300);
            ctx.save();
            ctx.translate(150,150);
            const vacAlpha = 1 - Math.min(1, t*1.2);
            // Vacuum body fading out
            if(vacAlpha>0){
                ctx.beginPath();
                ctx.ellipse(-8, 18, 22*vacAlpha, 18*vacAlpha, 0,0,Math.PI*2);
                ctx.fillStyle = `rgba(75,85,58, ${0.8*vacAlpha})`;
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(-5, 35, 12*vacAlpha, 10*vacAlpha, 0,0,Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(8, 10);
                ctx.lineTo(20*vacAlpha, 25*vacAlpha);
                ctx.lineWidth = 5*vacAlpha;
                ctx.stroke();
            }
            // Duster emerges
            const dustIntensity = Math.min(1, Math.max(0, (t-0.2)/0.8));
            if(dustIntensity>0){
                const handleX = -10;
                const handleY = 30 - dustIntensity*6;
                ctx.beginPath();
                ctx.rect(handleX-4, handleY-15, 8, 45);
                ctx.fillStyle = `rgba(140,115,80,0.9)`;
                ctx.fill();
                // fluffy feather head
                ctx.beginPath();
                ctx.ellipse(handleX+2, handleY-20, 16*dustIntensity, 20*dustIntensity, 0.3, 0, Math.PI*2);
                ctx.fillStyle = `rgba(205,185,145, ${0.9*dustIntensity})`;
                ctx.fill();
                for(let f=0; f<12; f++){
                    ctx.beginPath();
                    let angle = f*0.5;
                    let rad = 12*dustIntensity;
                    ctx.ellipse(handleX+2+Math.sin(angle)*rad*0.7, handleY-22+Math.cos(angle*1.3)*rad*0.8, 3, 8, angle, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(215,190,135, ${0.6*dustIntensity})`;
                    ctx.fill();
                }
            }
            ctx.restore();
        }
        
        // 4. DUSTER (t=0) -> SQUEEGEE (t=1)
        function drawDusterToSqueegee(ctx, t) {
            ctx.clearRect(0,0,300,300);
            ctx.save();
            ctx.translate(150,150);
            const dustAlpha = 1 - Math.min(1, t*1.1);
            if(dustAlpha>0){
                ctx.beginPath();
                ctx.ellipse(-5, -15, 18*dustAlpha, 22*dustAlpha, 0,0,Math.PI*2);
                ctx.fillStyle = `rgba(195,170,125, ${0.85*dustAlpha})`;
                ctx.fill();
                ctx.beginPath();
                ctx.rect(-12, 8, 8, 45);
                ctx.fillStyle = `rgba(125,100,70,0.8)`;
                ctx.fill();
            }
            const sqIntensity = Math.min(1, Math.max(0, (t-0.2)/0.8));
            if(sqIntensity>0){
                // squeegee handle
                ctx.beginPath();
                ctx.rect(-12, 15, 8, 58);
                ctx.fillStyle = `rgba(100,88,65,0.9)`;
                ctx.fill();
                // rubber blade
                ctx.beginPath();
                ctx.moveTo(-25, 72);
                ctx.lineTo(20, 72);
                ctx.lineTo(22, 80);
                ctx.lineTo(-27, 80);
                ctx.fillStyle = `rgba(70,75,60, ${0.95*sqIntensity})`;
                ctx.fill();
                ctx.beginPath();
                ctx.rect(-24, 78, 46, 5);
                ctx.fillStyle = `rgba(55,60,48,0.9)`;
                ctx.fill();
                // metal accent
                ctx.beginPath();
                ctx.moveTo(-22, 70);
                ctx.lineTo(18, 70);
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = `#b0a07a`;
                ctx.stroke();
            }
            ctx.restore();
        }
        
        // map global progress to segment and intra tween
        let lastProgress = 0;
        function drawBasedOnProgress(progress01) { // 0..1
            if(progress01 >= 0.999) {
                // final frame: draw squeegee perfectly
                drawDusterToSqueegee(ctx, 1.0);
                return;
            }
            // Determine which segment: each tool occupies 0.2 range, except transitions morph inside each interval.
            // We have 5 tools => 4 transitions (broom->mop, mop->vacuum, vacuum->duster, duster->squeegee)
            // However from 0 to 0.2 = pure broom? no for smoothness, morphing across entire range:
            // better: segment i from 0 to 0.25 for first morph, but to make all tools appear, we map:
            // For 0 to 0.2: broom -> mop morph, at 0 = broom, 0.2 = mop.
            // 0.2 to 0.4: mop -> vacuum morph, 0.2=mop, 0.4=vacuum.
            // 0.4 to 0.6: vacuum -> duster, 0.6=duster.
            // 0.6 to 0.8: duster -> squeegee, 0.8=squeegee.
            // 0.8 to 1.0: hold squeegee (full), but we also show perfect final.
            let morphT, segment;
            if(progress01 <= 0.2) {
                segment = 0;
                morphT = progress01 / 0.2;  // broom -> mop
                drawBroomToMop(ctx, morphT);
            } 
            else if(progress01 <= 0.4) {
                segment = 1;
                morphT = (progress01 - 0.2) / 0.2;
                drawMopToVacuum(ctx, morphT);
            }
            else if(progress01 <= 0.6) {
                segment = 2;
                morphT = (progress01 - 0.4) / 0.2;
                drawVacuumToDuster(ctx, morphT);
            }
            else if(progress01 <= 0.8) {
                segment = 3;
                morphT = (progress01 - 0.6) / 0.2;
                drawDusterToSqueegee(ctx, morphT);
            }
            else {
                // final zone: perfect squeegee
                drawDusterToSqueegee(ctx, 1.0);
            }
        }
        
        // loading simulation: duration 5.2 seconds smooth
        let loadingDuration = 5200; // ms
        let startTimestamp = null;
        
        function updateLoading(now) {
            if(loadingComplete) return;
            if(startTimestamp === null) startTimestamp = now;
            let elapsed = now - startTimestamp;
            let rawProgress = Math.min(1, elapsed / loadingDuration);
            let easedProgress = easeOutCubic(rawProgress);
            // update progress bar & percent
            const percent = Math.floor(easedProgress * 100);
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('percentLabel').innerText = `${percent}%`;
            // draw canvas morph
            drawBasedOnProgress(easedProgress);
            
            if(rawProgress >= 1.0) {
                // loading complete
                loadingComplete = true;
                if(animationFrameId) cancelAnimationFrame(animationFrameId);
                // finalize to squeegee crisp
                drawDusterToSqueegee(ctx, 1.0);
                // fade out loading screen, reveal content
                const loadingEl = document.getElementById('loadingScreen');
                const mainEl = document.getElementById('mainContent');
                loadingEl.style.opacity = '0';
                setTimeout(() => {
                    loadingEl.style.display = 'none';
                    mainEl.style.visibility = 'visible';
                    mainEl.style.opacity = '1';
                }, 800);
                return;
            }
            animationFrameId = requestAnimationFrame(updateLoading);
        }
        
        function easeOutCubic(x) {
            return 1 - Math.pow(1 - x, 3);
        }
        
        function startLoading() {
            resizeCanvas();
            startTimestamp = null;
            animationFrameId = requestAnimationFrame(updateLoading);
        }
        
        // initial draw
        drawBroomToMop(ctx, 0);
        startLoading();
        
        // handle canvas resize on load
        window.addEventListener('load', () => {
            resizeCanvas();
        });
    })();
</script>
</body>
</html>
