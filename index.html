<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Elegant Cleanse | Professional Loading Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', 'Helvetica Neue', sans-serif;
            background: #f3efe5;
        }

        /* MAIN LOADING SCREEN CONTAINER */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #eef0e0 0%, #dbe3ce 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* subtle texture overlay */
        .loading-screen::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#cbd8b0 0.8px, transparent 0.8px);
            background-size: 28px 28px;
            opacity: 0.2;
            pointer-events: none;
        }

        /* CARD ANIMATION ZONE */
        .animation-stage {
            background: rgba(250, 248, 240, 0.65);
            backdrop-filter: blur(2px);
            border-radius: 64px;
            padding: 2rem 3rem;
            box-shadow: 0 20px 35px -12px rgba(60, 45, 30, 0.12), 0 1px 3px rgba(0,0,0,0.02);
            border: 1px solid rgba(215, 205, 175, 0.5);
            margin-bottom: 2.5rem;
        }

        .morph-canvas {
            width: 280px;
            height: 280px;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 8px 12px rgba(70, 60, 40, 0.1));
        }

        .loading-caption {
            margin-top: 2rem;
            font-weight: 450;
            letter-spacing: 0.3px;
            font-size: 1rem;
            color: #5c6048;
            background: rgba(245, 242, 232, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            border: 0.5px solid #dad1ba;
        }

        .loading-caption span {
            font-weight: 500;
            color: #5f6b3c;
        }

        .progress-container {
            width: 240px;
            margin-top: 1.8rem;
            background: #e2decb;
            border-radius: 100px;
            height: 4px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #83945e;
            border-radius: 100px;
            transition: width 0.1s linear;
        }

        .percent-text {
            margin-top: 0.6rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #7c8262;
            letter-spacing: 0.5px;
        }

        .brand-note {
            position: absolute;
            bottom: 28px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #b0aa8b;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .main-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease 0.1s;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f7f0;
        }

        .demo-card {
            background: white;
            max-width: 500px;
            padding: 2.8rem;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
            border: 1px solid #e9e2cf;
        }

        .demo-card h2 {
            font-weight: 500;
            color: #6e7b4a;
            margin-bottom: 0.75rem;
        }

        .demo-card p {
            color: #8e927a;
            line-height: 1.5;
        }

        @media (max-width: 550px) {
            .animation-stage {
                padding: 1rem 2rem;
            }
            .morph-canvas {
                width: 220px;
                height: 220px;
            }
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="animation-stage">
        <canvas id="toolCanvas" class="morph-canvas" width="300" height="300" style="width:280px; height:280px"></canvas>
    </div>
    <div class="loading-caption">
        ✨ <span>preparing essentials</span> ✨
    </div>
    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="percent-text" id="percentLabel">0%</div>
    <div class="brand-note">clean flow · professional morphing sequence</div>
</div>

<div class="main-content" id="mainContent">
    <div class="demo-card">
        <h2>✨ spotless journey ✨</h2>
        <p>Your cleaning tools are ready.<br>Broom · Mop · Vacuum · Duster · Squeegee — seamless transition.<br><br> <span style="font-size:0.85rem; color:#b7b78a;">professional loading complete</span></p>
    </div>
</div>

<script>
    (function(){
        // Get elements
        const canvas = document.getElementById('toolCanvas');
        const ctx = canvas.getContext('2d');
        
        // FIX: Ensure canvas dimensions are set properly
        canvas.width = 300;
        canvas.height = 300;
        
        // Loading state
        let loadingComplete = false;
        let animationFrameId = null;
        let startTimestamp = null;
        const loadingDuration = 5200; // 5.2 seconds
        
        // ---------- PROFESSIONAL MORPHING DRAWING FUNCTIONS ----------
        // Each function receives a 't' value from 0 to 1 and draws the interpolated shape
        // between two consecutive cleaning tools.
        
        // 1. BROOM (t=0) -> MOP (t=1)
        function drawBroomToMop(ctx, t) {
            ctx.clearRect(0, 0, 300, 300);
            ctx.save();
            ctx.translate(150, 150);
            
            // Handle (shared element)
            const handleAngle = -0.28 * Math.PI + (t * 0.08);
            const handleLength = 98 - (t * 10);
            const startX = -12;
            const startY = 58 - (t * 6);
            const endX = startX + Math.sin(handleAngle) * handleLength;
            const endY = startY + Math.cos(handleAngle) * handleLength;
            
            // Draw wooden handle
            ctx.beginPath();
            ctx.moveTo(startX - 6, startY);
            ctx.lineTo(endX - 5, endY);
            ctx.lineTo(endX + 5, endY);
            ctx.lineTo(startX + 6, startY);
            ctx.fillStyle = `rgba(110, 90, 60, 0.95)`;
            ctx.fill();
            
            // BROOM part (fades out)
            if (t < 0.85) {
                const broomIntensity = Math.max(0, 1 - t / 0.85);
                ctx.beginPath();
                ctx.moveTo(endX - 14, endY);
                ctx.quadraticCurveTo(endX + (1-t)*8, endY + 22 * broomIntensity, endX + 12 * broomIntensity, endY + 28 * broomIntensity);
                ctx.lineTo(endX - 12 * broomIntensity, endY + 28 * broomIntensity);
                ctx.quadraticCurveTo(endX - (1-t)*8, endY + 22 * broomIntensity, endX + 14, endY);
                ctx.fillStyle = `rgba(145, 115, 70, ${0.9 * broomIntensity})`;
                ctx.fill();
                
                // Bristle details
                for(let i = 0; i < 10; i++) {
                    ctx.beginPath();
                    const offset = -12 + i * 2.8;
                    ctx.moveTo(endX + offset, endY);
                    ctx.lineTo(endX + offset + (1-t)*6, endY + 20 * broomIntensity);
                    ctx.strokeStyle = `rgba(100, 75, 45, ${0.7 * broomIntensity})`;
                    ctx.lineWidth = 1.3;
                    ctx.stroke();
                }
            }
            
            // MOP part (appears)
            if (t > 0.15) {
                const mopIntensity = Math.min(1, Math.max(0, (t - 0.15) / 0.85));
                const mopX = endX + 2;
                const mopY = endY + 8 * mopIntensity;
                
                // Mop head base
                ctx.beginPath();
                ctx.ellipse(mopX, mopY + 10 * mopIntensity, 14, 18 * mopIntensity, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(165, 140, 100, ${0.85 * mopIntensity})`;
                ctx.fill();
                
                // Mop strings/fringes
                for(let s = 0; s < 14; s++) {
                    ctx.beginPath();
                    const angleOff = -0.7 + s * 0.12;
                    ctx.moveTo(mopX + Math.sin(angleOff) * 9, mopY + 3);
                    ctx.lineTo(mopX + Math.sin(angleOff) * 14, mopY + 28 * mopIntensity);
                    ctx.strokeStyle = `rgba(120, 95, 65, ${0.65 * mopIntensity})`;
                    ctx.lineWidth = 1.4;
                    ctx.stroke();
                }
            }
            ctx.restore();
        }
        
        // 2. MOP (t=0) -> VACUUM (t=1)
        function drawMopToVacuum(ctx, t) {
            ctx.clearRect(0, 0, 300, 300);
            ctx.save();
            ctx.translate(150, 150);
            
            const handleAngle = -0.25 * Math.PI + (t * 0.12);
            const handleLength = 88 - (t * 14);
            const startX = -10;
            const startY = 55 - (t * 8);
            const endX = startX + Math.sin(handleAngle) * handleLength;
            const endY = startY + Math.cos(handleAngle) * handleLength;
            
            // Handle
            ctx.beginPath();
            ctx.rect(startX - 5, startY - 3, 10, handleLength);
            ctx.fillStyle = `rgba(105, 88, 62, 0.92)`;
            ctx.fill();
            
            // Mop head fading
            if(t < 0.8) {
                const mopAlpha = 1 - t / 0.8;
                ctx.beginPath();
                ctx.ellipse(endX - 2, endY + 14, 15, 20 * mopAlpha, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(155, 130, 90, ${0.8 * mopAlpha})`;
                ctx.fill();
            }
            
            // Vacuum cleaner appearing
            if(t > 0.2) {
                const vacIntensity = Math.min(1, Math.max(0, (t - 0.2) / 0.8));
                const bodyX = endX + 10 * vacIntensity;
                const bodyY = endY - 8 * vacIntensity;
                
                // Main vacuum body
                ctx.beginPath();
                ctx.ellipse(bodyX + 6, bodyY + 14, 20 * vacIntensity, 16 * vacIntensity, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(75, 88, 62, ${0.9 * vacIntensity})`;
                ctx.fill();
                
                // Vacuum canister detail
                ctx.beginPath();
                ctx.ellipse(bodyX + 4, bodyY + 28, 12 * vacIntensity, 10 * vacIntensity, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(60, 70, 50, ${0.85 * vacIntensity})`;
                ctx.fill();
                
                // Hose/nozzle
                ctx.beginPath();
                ctx.moveTo(bodyX + 12, bodyY + 18);
                ctx.lineTo(bodyX + 32 * vacIntensity, bodyY + 26 * vacIntensity);
                ctx.lineWidth = 6 * vacIntensity;
                ctx.strokeStyle = `rgba(50, 60, 42, ${0.8 * vacIntensity})`;
                ctx.stroke();
                
                // Wheel detail
                ctx.beginPath();
                ctx.arc(bodyX - 4, bodyY + 34, 7 * vacIntensity, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(45, 55, 38, ${0.7 * vacIntensity})`;
                ctx.fill();
            }
            ctx.restore();
        }
        
        // 3. VACUUM (t=0) -> DUSTER (t=1)
        function drawVacuumToDuster(ctx, t) {
            ctx.clearRect(0, 0, 300, 300);
            ctx.save();
            ctx.translate(150, 150);
            
            const vacAlpha = 1 - Math.min(1, t * 1.2);
            // Vacuum fading
            if(vacAlpha > 0.05) {
                ctx.beginPath();
                ctx.ellipse(-10, 20, 22 * vacAlpha, 18 * vacAlpha, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(78, 90, 60, ${0.85 * vacAlpha})`;
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(-6, 38, 13 * vacAlpha, 11 * vacAlpha, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(62, 72, 48, ${0.8 * vacAlpha})`;
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(6, 12);
                ctx.lineTo(22 * vacAlpha, 28 * vacAlpha);
                ctx.lineWidth = 5 * vacAlpha;
                ctx.strokeStyle = `rgba(55, 65, 45, ${0.75 * vacAlpha})`;
                ctx.stroke();
            }
            
            // Duster emerging
            const dustIntensity = Math.min(1, Math.max(0, (t - 0.2) / 0.8));
            if(dustIntensity > 0) {
                const handleX = -8;
                const handleY = 28 - dustIntensity * 4;
                
                // Handle
                ctx.beginPath();
                ctx.rect(handleX - 4, handleY - 18, 8, 50);
                ctx.fillStyle = `rgba(135, 108, 78, 0.92)`;
                ctx.fill();
                
                // Fluffy duster head
                ctx.beginPath();
                ctx.ellipse(handleX + 2, handleY - 24, 18 * dustIntensity, 22 * dustIntensity, 0.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(215, 190, 150, ${0.95 * dustIntensity})`;
                ctx.fill();
                
                // Feather details
                for(let f = 0; f < 14; f++) {
                    ctx.beginPath();
                    const angleOffset = f * 0.52;
                    const radX = 14 * dustIntensity;
                    const radY = 16 * dustIntensity;
                    ctx.ellipse(handleX + 2 + Math.sin(angleOffset) * radX * 0.6, 
                               handleY - 26 + Math.cos(angleOffset * 1.2) * radY * 0.7, 
                               3.5, 9, angleOffset, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(225, 200, 155, ${0.7 * dustIntensity})`;
                    ctx.fill();
                }
            }
            ctx.restore();
        }
        
        // 4. DUSTER (t=0) -> SQUEEGEE (t=1)
        function drawDusterToSqueegee(ctx, t) {
            ctx.clearRect(0, 0, 300, 300);
            ctx.save();
            ctx.translate(150, 150);
            
            const dustAlpha = 1 - Math.min(1, t * 1.15);
            if(dustAlpha > 0.05) {
                // Duster handle
                ctx.beginPath();
                ctx.rect(-12, 6, 8, 48);
                ctx.fillStyle = `rgba(125, 100, 72, ${0.85 * dustAlpha})`;
                ctx.fill();
                // Duster head
                ctx.beginPath();
                ctx.ellipse(-6, -18, 20 * dustAlpha, 24 * dustAlpha, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(205, 178, 138, ${0.9 * dustAlpha})`;
                ctx.fill();
            }
            
            // Squeegee appearing
            const sqIntensity = Math.min(1, Math.max(0, (t - 0.18) / 0.82));
            if(sqIntensity > 0) {
                // Squeegee handle (longer)
                ctx.beginPath();
                ctx.rect(-10, 12, 9, 62);
                ctx.fillStyle = `rgba(108, 92, 68, 0.94)`;
                ctx.fill();
                
                // Metal connector
                ctx.beginPath();
                ctx.rect(-14, 72, 17, 6);
                ctx.fillStyle = `rgba(130, 120, 95, ${0.9 * sqIntensity})`;
                ctx.fill();
                
                // Rubber blade (professional squeegee shape)
                ctx.beginPath();
                ctx.moveTo(-28, 78);
                ctx.lineTo(20, 78);
                ctx.lineTo(23, 88);
                ctx.lineTo(-31, 88);
                ctx.fillStyle = `rgba(65, 72, 55, ${0.96 * sqIntensity})`;
                ctx.fill();
                
                // Blade edge detail
                ctx.beginPath();
                ctx.rect(-27, 86, 49, 4);
                ctx.fillStyle = `rgba(50, 58, 42, ${0.9 * sqIntensity})`;
                ctx.fill();
                
                // Shine line on blade
                ctx.beginPath();
                ctx.moveTo(-25, 80);
                ctx.lineTo(18, 80);
                ctx.lineWidth = 2;
                ctx.strokeStyle = `rgba(210, 205, 170, ${0.7 * sqIntensity})`;
                ctx.stroke();
            }
            ctx.restore();
        }
        
        // Main drawing dispatcher based on global progress (0 to 1)
        function drawByProgress(progress) {
            if(progress >= 0.99) {
                // Final frame: perfect squeegee
                drawDusterToSqueegee(ctx, 1.0);
                return;
            }
            
            // Map progress through 4 morphing segments:
            // 0.00 - 0.22 : broom -> mop
            // 0.22 - 0.44 : mop -> vacuum
            // 0.44 - 0.66 : vacuum -> duster
            // 0.66 - 0.88 : duster -> squeegee
            // 0.88 - 1.00 : hold final squeegee (smooth)
            
            if(progress <= 0.22) {
                const t = progress / 0.22;  // 0 to 1
                drawBroomToMop(ctx, t);
            } 
            else if(progress <= 0.44) {
                const t = (progress - 0.22) / 0.22;
                drawMopToVacuum(ctx, t);
            }
            else if(progress <= 0.66) {
                const t = (progress - 0.44) / 0.22;
                drawVacuumToDuster(ctx, t);
            }
            else if(progress <= 0.88) {
                const t = (progress - 0.66) / 0.22;
                drawDusterToSqueegee(ctx, t);
            }
            else {
                // Final zone: show fully formed squeegee
                drawDusterToSqueegee(ctx, 1.0);
            }
        }
        
        // Easing function for smooth professional feel
        function easeOutCubic(x) {
            return 1 - Math.pow(1 - x, 3);
        }
        
        // Progress bar update and animation loop
        function updateLoading(now) {
            if(loadingComplete) return;
            
            if(startTimestamp === null) {
                startTimestamp = now;
            }
            
            let elapsed = now - startTimestamp;
            let rawProgress = Math.min(1, elapsed / loadingDuration);
            let easedProgress = easeOutCubic(rawProgress);
            
            // Update UI
            const percent = Math.floor(easedProgress * 100);
            const progressFill = document.getElementById('progressFill');
            const percentLabel = document.getElementById('percentLabel');
            if(progressFill) progressFill.style.width = `${percent}%`;
            if(percentLabel) percentLabel.innerText = `${percent}%`;
            
            // Draw the current morph state
            drawByProgress(easedProgress);
            
            if(rawProgress >= 1.0) {
                // Loading complete
                loadingComplete = true;
                if(animationFrameId) cancelAnimationFrame(animationFrameId);
                
                // Final draw as perfect squeegee
                drawDusterToSqueegee(ctx, 1.0);
                
                // Fade out loading screen, reveal main content
                const loadingScreen = document.getElementById('loadingScreen');
                const mainContent = document.getElementById('mainContent');
                
                if(loadingScreen) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        if(mainContent) {
                            mainContent.style.visibility = 'visible';
                            mainContent.style.opacity = '1';
                        }
                    }, 800);
                }
                return;
            }
            
            animationFrameId = requestAnimationFrame(updateLoading);
        }
        
        // Initialize everything
        function init() {
            // Ensure canvas is clean and draw initial broom
            ctx.clearRect(0, 0, 300, 300);
            drawBroomToMop(ctx, 0);
            
            // Reset loading state
            loadingComplete = false;
            startTimestamp = null;
            
            // Start animation
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(updateLoading);
        }
        
        // Start the loading animation when page is fully loaded
        if(document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
        // Handle any window resize gracefully (just keep canvas crisp)
        window.addEventListener('resize', function() {
            // No action needed, canvas dimensions are fixed at 300x300
            // But re-draw current state if not complete
            if(!loadingComplete && animationFrameId) {
                // Force redraw will happen on next frame, but just in case:
                const currentFill = document.getElementById('progressFill');
                if(currentFill) {
                    let width = currentFill.style.width;
                    let percent = parseFloat(width) || 0;
                    drawByProgress(percent / 100);
                }
            }
        });
        
    })();
</script>
</body>
</html>
